<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Decision Memory · React CDN Canvas V6</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #070914;
      --panel: rgba(16, 20, 35, .82);
      --panel-2: rgba(20, 25, 45, .72);
      --panel-3: rgba(255,255,255,.055);
      --line: rgba(255,255,255,.10);
      --line-strong: rgba(132, 117, 255, .45);
      --text: #f8f8ff;
      --muted: #9ea5bb;
      --muted-2: #697086;
      --blue: #66a3ff;
      --purple: #9175ff;
      --cyan: #36d6ff;
      --green: #41e2a0;
      --orange: #ffb45f;
      --red: #ff6b8d;
      --shadow: 0 24px 80px rgba(0,0,0,.32);
      --radius: 18px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; margin: 0; }
    body {
      font-family: var(--font);
      background:
        radial-gradient(circle at 16% 10%, rgba(78, 95, 255, .24), transparent 34%),
        radial-gradient(circle at 76% 22%, rgba(146, 89, 255, .24), transparent 30%),
        radial-gradient(circle at 76% 88%, rgba(22, 205, 255, .14), transparent 28%),
        linear-gradient(135deg, #070914, #060713 54%, #04050c);
      color: var(--text);
      overflow: hidden;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 64px 1fr;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: 270px 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(8, 10, 20, .72);
      backdrop-filter: blur(22px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #3b82ff, #7c4dff 62%, #b06cff);
      box-shadow: 0 0 30px rgba(124, 77, 255, .55);
    }

    .brand-title { font-weight: 760; letter-spacing: -.03em; }
    .brand-subtitle { font-size: 12px; color: var(--muted-2); margin-top: 1px; }

    .toolbar-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }

    .search {
      width: min(460px, 100%);
      height: 38px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      background: rgba(255,255,255,.045);
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      padding: 0 12px;
      box-shadow: inset 0 0 26px rgba(145,117,255,.04);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 13px;
    }

    .search input::placeholder { color: #7c8398; }

    .tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-btn, .mode-btn, .zoom-pill {
      height: 38px;
      border: 1px solid rgba(255,255,255,.09);
      color: #dfe3f7;
      background: rgba(255,255,255,.045);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      font-weight: 650;
      font-size: 13px;
    }

    .tool-btn.icon { width: 38px; padding: 0; }
    .tool-btn.primary {
      border: 0;
      color: white;
      background: linear-gradient(135deg, #6d57ff, #9a75ff);
      box-shadow: 0 14px 30px rgba(116, 87, 255, .34);
    }
    .mode-btn.active {
      background: rgba(145, 117, 255, .15);
      border-color: rgba(145,117,255,.45);
      color: white;
    }
    .zoom-pill { min-width: 76px; color: #bfc5dc; }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 360px;
      min-height: 0;
      overflow: hidden;
    }

    .canvas-shell {
      position: relative;
      min-width: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(145,117,255,.14), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.018), transparent);
    }

    .canvas-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: .54;
      transform-origin: 0 0;
      pointer-events: none;
    }

    .canvas-watermark {
      position: absolute;
      left: 24px;
      top: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 5;
      padding: 8px 12px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(9, 11, 24, .56);
      backdrop-filter: blur(12px);
      color: #aeb5cc;
      font-size: 12px;
      pointer-events: none;
    }

    .canvas-stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 10400px;
      height: 1900px;
      transform-origin: 0 0;
    }

    .canvas-stage.animating {
      transition: transform var(--move-duration, .72s) cubic-bezier(.19, 1, .22, 1);
    }

    .stage-bg-line {
      position: absolute;
      left: 120px;
      top: 800px;
      width: 9940px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(145,117,255,.28), rgba(85,160,255,.58), rgba(145,117,255,.28), transparent);
      box-shadow: 0 0 40px rgba(145,117,255,.36);
    }

    .node {
      position: absolute;
      width: 182px;
      min-height: 117px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.11);
      background: linear-gradient(180deg, rgba(25, 30, 54, .88), rgba(12, 15, 30, .88));
      box-shadow: 0 18px 48px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.06);
      padding: 12px;
      user-select: none;
      transition: box-shadow .18s ease, border-color .18s ease;
      backdrop-filter: blur(18px);
    }

    .node:hover { box-shadow: 0 24px 76px rgba(0,0,0,.42), 0 0 0 1px rgba(255,255,255,.06); }
    .node.selected {
      border-color: rgba(145,117,255,.78);
      box-shadow: 0 24px 80px rgba(0,0,0,.36), 0 0 0 4px rgba(145,117,255,.14), 0 0 40px rgba(145,117,255,.30);
    }

    .node::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 2px;
      background: linear-gradient(var(--branch-dir), var(--accent), transparent);
      box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 80%, transparent);
      pointer-events: none;
    }
    .node.above::after {
      top: 100%;
      height: max(0px, calc(var(--knot-top) - 100%));
      --branch-dir: to bottom;
    }
    .node.below::after {
      top: var(--knot-top);
      height: calc(0px - var(--knot-top));
      --branch-dir: to top;
    }

    .node-knot {
      position: absolute;
      left: 50%;
      top: var(--knot-top);
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: #0a0d1c;
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 72%, transparent), inset 0 0 12px color-mix(in srgb, var(--accent) 24%, transparent);
      pointer-events: none;
    }

    .node-head {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 10px;
    }

    .node-icon {
      width: 30px;
      height: 30px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--accent) 16%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 44%, transparent);
      color: var(--accent);
      flex: 0 0 auto;
    }

    .node-time {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      color: #858da5;
      margin-bottom: 2px;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }
    .node-time:hover { color: #d7dcff; text-decoration: underline; text-underline-offset: 3px; }
    .node-title { font-size: 12px; font-weight: 790; letter-spacing: -.025em; line-height: 1.18; color: white; }
    .node-hash {
      margin-top: 7px;
      height: 22px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.045);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 7px;
      color: #8f98b1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 8px;
      width: 100%;
      cursor: pointer;
    }
    .node-hash:hover {
      color: #eef0ff;
      border-color: color-mix(in srgb, var(--accent) 48%, transparent);
      background: color-mix(in srgb, var(--accent) 12%, rgba(255,255,255,.04));
    }
    .node-hash-label { color: var(--accent); font-weight: 800; font-family: var(--font); font-size: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .node-hash-value { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .best-buy-row {
      margin-top: 6px;
      min-height: 37px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 6px 7px;
      background: rgba(145, 117, 255, .075);
      border: 1px solid rgba(145, 117, 255, .14);
      color: #aeb6ce;
      font-size: 8px;
      overflow: hidden;
    }
    .best-buy-list {
      min-width: 0;
      display: grid;
      gap: 3px;
    }
    .best-buy-label {
      color: #cfc7ff;
      font-weight: 800;
      font-family: var(--font);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .055em;
    }
    .best-buy-link {
      min-width: 0;
      border: 0;
      background: transparent;
      padding: 0;
      color: #eef0ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .best-buy-link:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .best-buy-link small { color: #7f87a0; font-family: var(--font); font-size: 7px; margin-left: 4px; }
    .best-buy-empty { color: #697086; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .node-copy { color: #aeb6ce; font-size: 10px; line-height: 1.5; margin: 0; }
    .node-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .node-tag {
      height: 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      padding: 0 7px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.07);
      color: #cbd1e6;
      font-size: 9px;
      white-space: nowrap;
    }
    .score { color: var(--accent); font-size: 12px; font-weight: 800; }

    .floating-controls {
      position: absolute;
      left: 222px;
      bottom: 22px;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(10, 12, 24, .72);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }

    .mini-map {
      position: absolute;
      left: 22px;
      bottom: 22px;
      width: 178px;
      height: 118px;
      z-index: 8;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(10, 12, 24, .72);
      backdrop-filter: blur(16px);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.24);
    }
    .mini-title { padding: 9px 10px 0; color: #8e96af; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .mini-stage { position: relative; height: 88px; margin: 4px 10px 10px; border-radius: 10px; background: rgba(255,255,255,.04); }
    .mini-dot { position: absolute; width: 9px; height: 7px; border-radius: 3px; background: rgba(145,117,255,.75); }
    .mini-viewport { position: absolute; left: 52px; top: 22px; width: 58px; height: 38px; border: 1px solid rgba(255,255,255,.48); border-radius: 6px; }

    .inspector {
      position: relative;
      border-left: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(13,16,30,.86), rgba(7,9,18,.92));
      backdrop-filter: blur(24px);
      min-width: 0;
      overflow-y: auto;
      z-index: 15;
    }

    .inspector-inner { padding: 18px; }
    .panel {
      border: 1px solid rgba(255,255,255,.085);
      border-radius: 20px;
      background: rgba(255,255,255,.04);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.045);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,.075);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-head h2 { margin: 0; font-size: 15px; letter-spacing: -.02em; }
    .badge {
      height: 26px;
      padding: 0 7px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      background: rgba(145,117,255,.14);
      color: #cfc5ff;
      font-weight: 750;
      font-size: 9px;
      border: 1px solid rgba(145,117,255,.24);
      white-space: nowrap;
    }

    .slice-profile { padding: 16px; }
    .slice-title-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
    .slice-avatar {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
      flex: 0 0 auto;
    }
    .slice-title-row strong { display: block; font-size: 17px; letter-spacing: -.03em; }
    .slice-title-row small { display: block; color: var(--muted-2); margin-top: 3px; }
    .inspector-best-buy {
      margin-top: 10px;
      border: 1px solid rgba(145,117,255,.18);
      background: rgba(145,117,255,.07);
      border-radius: 12px;
      padding: 10px 11px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .inspector-best-buy label { color: #cfc7ff; font-size: 10px; font-weight: 850; text-transform: uppercase; letter-spacing: .07em; white-space: nowrap; }
    .inspector-best-buy-list { display: grid; gap: 7px; min-width: 0; }
    .inspector-best-buy-item { display: grid; grid-template-columns: 72px minmax(0, 1fr); align-items: center; gap: 8px; }
    .inspector-best-buy-time { color: #8f98b1; font-size: 10px; white-space: nowrap; }
    .inspector-best-buy button { border: 0; background: transparent; padding: 0; color: #eef0ff; font-size: 11px; text-align: left; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .inspector-best-buy button:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    .inspector-best-buy span { color: #697086; font-size: 11px; }

    .section {
      padding: 15px 16px;
      border-top: 1px solid rgba(255,255,255,.075);
    }
    .section h3 {
      margin: 0 0 9px;
      color: #e8ebfb;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .section p { margin: 0; color: #acb4cb; font-size: 13px; line-height: 1.65; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px;
      background: rgba(255,255,255,.035);
      border-radius: 14px;
    }
    .tab {
      height: 32px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #858ca1;
      font-size: 12px;
      font-weight: 700;
    }
    .tab.active { background: rgba(255,255,255,.08); color: white; }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 16px 16px;
    }
    .metric {
      border: 1px solid rgba(255,255,255,.075);
      background: rgba(255,255,255,.04);
      border-radius: 15px;
      padding: 12px;
    }
    .metric label { display: block; color: #858ca1; font-size: 11px; margin-bottom: 5px; }
    .metric strong { display: block; color: white; font-size: 20px; letter-spacing: -.04em; }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-chip {
      height: 29px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(145,117,255,.11);
      border: 1px solid rgba(145,117,255,.22);
      color: #cfc7ff;
      font-size: 12px;
      font-weight: 650;
    }

    .replay-btn {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 15px;
      color: white;
      font-weight: 830;
      margin-top: 14px;
      background: linear-gradient(135deg, #6d57ff, #9a75ff);
      box-shadow: 0 20px 38px rgba(116,87,255,.30);
    }

    .empty-state {
      height: calc(100vh - 110px);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 28px;
    }
    .empty-state h2 { margin: 12px 0 8px; color: white; font-size: 19px; }
    .empty-state p { margin: 0; line-height: 1.6; font-size: 13px; }

    @media (max-width: 1050px) {
      .workspace { grid-template-columns: 1fr; }
      .inspector { display: none; }
      .topbar { grid-template-columns: 220px 1fr auto; }
      .toolbar-center .mode-btn { display: none; }
    }
    @media (max-width: 760px) {
      .topbar { grid-template-columns: 1fr auto; }
      .toolbar-center { display: none; }
      .tool-btn:not(.primary):not(.icon), .zoom-pill { display: none; }
    }
  </style>
</head>

    function Topbar({ mode, setMode, scale, setScale }) {
      const zoom = Math.round(scale * 100);
      return (
        <header className="topbar">
          <div className="brand">
            <div className="logo"><Icon type="spark" size={21} /></div>
            <div>
              <div className="brand-title">AI Decision Memory</div>
              <div className="brand-subtitle">40-slice decision replay canvas</div>
            </div>
          </div>

          <div className="toolbar-center">
            <button className={`mode-btn ${mode === 'select' ? 'active' : ''}`} onClick={() => setMode('select')}><Icon type="cursor" size={15}/> Select</button>
            <button className={`mode-btn ${mode === 'pan' ? 'active' : ''}`} onClick={() => setMode('pan')}><Icon type="hand" size={15}/> Pan</button>
            <button className={`mode-btn ${mode === 'comment' ? 'active' : ''}`} onClick={() => setMode('comment')}><Icon type="comment" size={15}/> Comment</button>
            <div className="search"><Icon type="search" size={15}/><input placeholder="Search slices, reasoning, evidence..." /></div>
          </div>

          <div className="tools">
            <button className="tool-btn icon" onClick={() => setScale(s => Math.max(.55, +(s - .1).toFixed(2)))}>-</button>
            <div className="zoom-pill">{zoom}%</div>
            <button className="tool-btn icon" onClick={() => setScale(s => Math.min(1.45, +(s + .1).toFixed(2)))}>+</button>
            <button className="tool-btn"><Icon type="share" size={15}/> Share</button>
            <button className="tool-btn primary"><Icon type="plus" size={15}/> New Slice</button>
          </div>
        </header>
      );
    }

    function DecisionNode({ node, selected, onSelect, onCenter, onJump }) {
      return (
        <article
          className={`node ${node.side} ${selected ? 'selected' : ''}`}
          style={{ left: node.x, top: node.y, '--accent': node.accent, '--knot-top': `${800 - node.y}px` }}
          onMouseDown={(e) => { e.stopPropagation(); onSelect(node.id); }}
        >
          <span className="node-knot" />
          <div className="node-head">
            <div className="node-icon"><Icon type={node.icon} size={16}/></div>
            <div>
              <button className="node-time" onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onCenter(node); }}>{node.time}</button>
              <div className="node-title">{node.title}</div>
            </div>
          </div>
          <p className="node-copy">{node.summary}</p>
          <button className="node-hash" onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onCenter(node); }}>
            <span className="node-hash-label">Hash</span>
            <span className="node-hash-value">{node.hash}</span>
          </button>
          <div className="best-buy-row">
            <span className="best-buy-label">Best Buy Time</span>
            {node.bestBuyRefs && node.bestBuyRefs.length ? (
              <div className="best-buy-list">
                {node.bestBuyRefs.map(ref => (
                  <button key={ref.id} className="best-buy-link" title={`Jump backward to ${ref.title} · ${ref.hash}`} onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onJump(ref.id); }}>
                    {ref.hash}<small>{ref.time.split(' · ')[0]}</small>
                  </button>
                ))}
              </div>
            ) : <span className="best-buy-empty">No prior hash</span>}
          </div>
          <div className="node-meta">
            <span className="node-tag">{node.type}</span>
            <span className="score">{node.confidence}%</span>
          </div>
        </article>
      );
    }

    function Canvas({ nodes, selectedId, setSelectedId, scale, setScale, focusRequest }) {
      const [pan, setPan] = useState({ x: -3550, y: -320 });
      const [isAnimating, setIsAnimating] = useState(false);
      const [moveDuration, setMoveDuration] = useState(720);
      const drag = useRef(null);
      const shellRef = useRef(null);
      const animationTimer = useRef(null);
      const didInitialCenter = useRef(false);
      const selected = nodes.find(n => n.id === selectedId);
      const TIMELINE_Y = 800;

      useEffect(() => {
        const shell = shellRef.current;
        if (!shell || didInitialCenter.current) return;
        const rect = shell.getBoundingClientRect();
        setPan(prev => ({ ...prev, y: rect.height / 2 - TIMELINE_Y * scale }));
        didInitialCenter.current = true;
      }, [scale]);

      useEffect(() => {
        if (!focusRequest) return;
        const target = nodes.find(n => n.id === focusRequest.id);
        if (target) centerNode(target);
      }, [focusRequest]);

      function centerNode(node) {
        const shell = shellRef.current;
        if (!shell) return;
        const rect = shell.getBoundingClientRect();
        const nodeCenterX = node.x + 91;
        const nextX = rect.width / 2 - nodeCenterX * scale;
        setSelectedId(node.id);
        setIsAnimating(true);
        window.clearTimeout(animationTimer.current);
        setPan(prev => {
          const distance = Math.abs(nextX - prev.x);
          const duration = Math.max(420, Math.min(1800, Math.round(360 + distance * 0.18)));
          setMoveDuration(duration);
          animationTimer.current = window.setTimeout(() => setIsAnimating(false), duration + 60);
          return {
            x: nextX,
            y: prev.y
          };
        });
      }

      function centerById(id) {
        const target = nodes.find(n => n.id === id);
        if (target) centerNode(target);
      }

      function handleMouseDown(e) {
        setIsAnimating(false);
        drag.current = { startX: e.clientX, startY: e.clientY, x: pan.x, y: pan.y };
        setSelectedId(null);
      }
      function handleMouseMove(e) {
        if (!drag.current) return;
        const dx = e.clientX - drag.current.startX;
        const dy = e.clientY - drag.current.startY;
        setPan({ x: drag.current.x + dx, y: drag.current.y + dy });
      }
      function handleMouseUp() { drag.current = null; }
      function handleWheel(e) {
        e.preventDefault();
        const next = Math.min(1.45, Math.max(.55, scale - e.deltaY * 0.001));
        setScale(+next.toFixed(2));
      }

      return (
        <main ref={shellRef} className="canvas-shell" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onWheel={handleWheel}>
          <div className="canvas-watermark"><Icon type="cursor" size={14}/> Figma-like canvas · drag to pan · wheel to zoom · click hash to jump</div>
          <div className={`canvas-stage ${isAnimating ? 'animating' : ''}`} style={{ transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})`, '--move-duration': `${moveDuration}ms` }}>
            <div className="stage-bg-line" />
            {nodes.map(node => <DecisionNode key={node.id} node={node} selected={selectedId === node.id} onSelect={setSelectedId} onCenter={centerNode} onJump={centerById} />)}
          </div>

          <div className="floating-controls">
            <button className="tool-btn icon" onClick={() => setScale(.8)} title="Reset zoom">⌂</button>
            <button className="tool-btn icon" onClick={() => selected ? centerNode(selected) : setPan(prev => ({ x: -3550, y: prev.y }))} title="Center selected">◎</button>
            <button className="tool-btn"><Icon type="shield" size={15}/> Proof Layer</button>
          </div>

          <div className="mini-map">
            <div className="mini-title">Canvas Map</div>
            <div className="mini-stage">
              {nodes.map((n) => <i key={n.id} className="mini-dot" style={{ left: n.x / 59, top: n.y / 11, background: n.accent }} />)}
              <span className="mini-viewport" />
            </div>
          </div>
        </main>
      );
    }

    function Inspector({ node, onJump }) {
      const [tab, setTab] = useState('reason');
      if (!node) {
        return <aside className="inspector"><div className="empty-state"><div><Icon type="spark" size={34}/><h2>No slice selected</h2><p>Select a decision slice on the canvas to inspect its reasoning, context, evidence, and outcome.</p></div></div></aside>;
      }
      const content = {
        reason: node.reasoning,
        context: node.question,
        evidence: 'Evidence includes market news, financial reports, model release notes, internal signal snapshots, and immutable proof records.',
        outcome: `Recorded outcome: ${node.outcome}. Confidence at decision time: ${node.confidence}%.`
      }[tab];

      return (
        <aside className="inspector">
          <div className="inspector-inner">
            <section className="panel">
              <div className="panel-head">
                <h2>Slice Inspector</h2>
                <span className="badge">Selected</span>
              </div>
              <div className="slice-profile" style={{ '--accent': node.accent }}>
                <div className="slice-title-row">
                  <div className="slice-avatar"><Icon type={node.icon} size={22}/></div>
                  <div>
                    <strong>{node.title}</strong>
                    <small>{node.time}</small>
                    <small>{node.hash}</small>
                  </div>
                </div>
                <div className="inspector-best-buy">
                  <label>Best Buy Time</label>
                  {node.bestBuyRefs && node.bestBuyRefs.length ? (
                    <div className="inspector-best-buy-list">
                      {node.bestBuyRefs.map(ref => (
                        <div className="inspector-best-buy-item" key={ref.id}>
                          <span className="inspector-best-buy-time">{ref.time.split(' · ')[0]}</span>
                          <button title={`Jump backward to ${ref.title} · ${ref.hash}`} onClick={() => onJump(ref.id)}>{ref.hash}</button>
                        </div>
                      ))}
                    </div>
                  ) : <span>No prior hash</span>}
                </div>
                <div className="tabs">
                  <button className={`tab ${tab === 'reason' ? 'active' : ''}`} onClick={() => setTab('reason')}>Reason</button>
                  <button className={`tab ${tab === 'context' ? 'active' : ''}`} onClick={() => setTab('context')}>Context</button>
                  <button className={`tab ${tab === 'evidence' ? 'active' : ''}`} onClick={() => setTab('evidence')}>Evidence</button>
                  <button className={`tab ${tab === 'outcome' ? 'active' : ''}`} onClick={() => setTab('outcome')}>Outcome</button>
                </div>
              </div>
              <div className="section">
                <h3>{tab}</h3>
                <p>{content}</p>
              </div>
              <div className="metric-grid">
                <div className="metric"><label>Confidence</label><strong>{node.confidence}%</strong></div>
                <div className="metric"><label>Outcome</label><strong>{node.outcome}</strong></div>
              </div>
              <div className="section">
                <h3>Decision Action</h3>
                <p>{node.action}</p>
              </div>
              <div className="section">
                <h3>Tags</h3>
                <div className="tags">{node.tags.map(tag => <span className="tag-chip" key={tag}>{tag}</span>)}</div>
                <button className="replay-btn">Replay This Decision</button>
              </div>
            </section>
          </div>
        </aside>
      );
    }

    function App() {
      const [mode, setMode] = useState('select');
      const [scale, setScale] = useState(.8);
      const [selectedId, setSelectedId] = useState('s20');
      const [focusRequest, setFocusRequest] = useState(null);
      const nodes = useMemo(() => {
        // Best Buy Time links are strictly backward on the visual timeline:
        // a card may only reference cards with a smaller x-position.
        // This prevents any future / right-side hash reference.
        const orderedByX = [...initialNodes].sort((a, b) => a.x - b.x);
        const candidatesById = new Map();
        orderedByX.forEach((node, index) => {
          // Strictly backward only: link to cards 4, 8, and 12 positions earlier when available.
          // That creates long-range reasoning backlinks without ever referencing a future/right-side card.
          const chosen = [4, 8, 12]
            .map(offset => orderedByX[index - offset])
            .filter(Boolean);
          candidatesById.set(node.id, chosen.map(ref => ({
            id: ref.id,
            hash: ref.hash,
            time: ref.time,
            title: ref.title,
            x: ref.x
          })));
        });
        return initialNodes.map(node => ({
          ...node,
          bestBuyRefs: candidatesById.get(node.id) || []
        }));
      }, []);
      const selected = nodes.find(n => n.id === selectedId);
      const requestFocus = (id) => {
        setSelectedId(id);
        setFocusRequest({ id, nonce: Date.now() });
      };

      return (
        <div className="app">
          <Topbar mode={mode} setMode={setMode} scale={scale} setScale={setScale}/>
          <div className="workspace">
            <Canvas nodes={nodes} selectedId={selectedId} setSelectedId={setSelectedId} scale={scale} setScale={setScale} focusRequest={focusRequest}/>
            <Inspector node={selected} onJump={requestFocus}/>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
